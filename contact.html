<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT</title>
    <link rel="icon" type="image/jpeg" href="logo.png">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

   

    <div class="contact-page">

        <div class="header-section">
            <div class="pulse-ring"></div>
            <h1 class="k1">CONTACT INFORMATION</h1>
        </div>

        <div class="info-grid">
            <div class="info-card" style="animation-delay: 0.1s">
                <div class="card-glow"></div>
                <div class="icon-wrap">
                    <i class="fa fa-envelope"></i>
                </div>
                <h3>Email</h3>
                <p>dasguptasayan.080@gmail.com</p>
            </div>

            <div class="info-card" style="animation-delay: 0.2s">
                <div class="card-glow"></div>
                <div class="icon-wrap">
                    <i class="fa fa-phone"></i>
                </div>
                <h3>Phone</h3>
                <p>+91 6290688153</p>
            </div>

            <div class="info-card" style="animation-delay: 0.3s">
                <div class="card-glow"></div>
                <div class="icon-wrap">
                    <i class="fa fa-map-marker"></i>
                </div>
                <h3>Location</h3>
                <p>Barasat, Kolkata<br>West Bengal, India</p>
            </div>
        </div>
        
        <div class="mail-btn">
    <a href="ContactUs.html">
        <button class="s2">
            SEND MAIL
        </button>
    </a>
</div><br><br>

        <div class="map-section">
            <div class="map-header">
                <span>FIND ME HERE</span>
            </div>
            <div class="map-wrapper">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d117849.46839830418!2d88.39482045!3d22.7236627!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39f89f588bfe5f13%3A0x6cbfb8c2a6b79a97!2sBarasat%2C%20West%20Bengal!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
                    width="100%"
                    height="100%"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                <div class="map-overlay-tag">
                    <i class="fa fa-map-marker"></i> Barasat, West Bengal
                </div>
            </div>
        </div>


        <div class="back-btn">
            <a href="index.html">
                <button class="s2">
                    BACK TO HOME
                </button>
            </a>
        </div>

    </div>
     <div class="particles" id="particles"></div>

    <script src="demo.js"></script>
    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.animationDuration = (4 + Math.random() * 6) + 's';
            dot.style.animationDelay = (Math.random() * 5) + 's';
            dot.style.width = dot.style.height = (2 + Math.random() * 3) + 'px';
            container.appendChild(dot);
        }

        const cards = document.querySelectorAll('.info-card');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });
        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
